  }
  nav.top .brand {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    letter-spacing: -0.01em;
  }
  nav.top .links {

    gap: 28px;

  nav.top .links a {

    text-decoration: none;
    font-size: 14px;
    font-weight: 400;
    position: relative;
    padding: 4px 0;
  }
  nav.top .links a::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 1px;
    background: var(--ink);
    transition: width 0.3s ease;
  }
  nav.top .links a:hover::after { width: 100%; }

  /* HERO */
  section.hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 32px 80px;
    position: relative;
  }
  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 32px;
    letter-spacing: 0.02em;
  }
  .hero-tag .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  .hero h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(56px, 11vw, 180px);
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  .hero h1 .accent { color: var(--accent); }
  .hero-sub {

    font-size: 20px;
    line-height: 1.5;
    color: var(--ink-soft);
    font-weight: 300;
  }
  .hero-meta {
    margin-top: 64px;
    display: flex;
    gap: 64px;
    flex-wrap: wrap;
    border-top: 1px solid var(--line);
    padding-top: 32px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .hero-meta div { display: flex; flex-direction: column; gap: 4px; }
  .hero-meta strong { color: var(--ink); font-weight: 500; }

  /* MARQUEE */
  .marquee {
    overflow: hidden;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 28px 0;
    margin: 80px 0;
    background: var(--bg-soft);
  }
  .marquee-track {
    display: flex;
    gap: 64px;
    white-space: nowrap;
    animation: scroll 40s linear infinite;
    font-family: 'Instrument Serif', serif;
    font-size: 36px;
    color: var(--ink);
  }
  .marquee-track span { display: inline-flex; align-items: center; gap: 64px; }
  .marquee-track span::after {
    content: '✦';
    color: var(--accent);
    font-size: 24px;
  }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 24px;
    margin-bottom: 64px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);

    font-size: 14px;
    color: var(--ink-soft);
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .section-header h2 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(32px, 5vw, 56px);
    letter-spacing: -0.02em;

  section.about {
    padding: 120px 32px;

    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;

  .about-grid p {
    font-size: 22px;
    line-height: 1.5;
    color: var(--ink);
    font-weight: 300;
    margin-bottom: 24px;
  }
  .about-grid p .em { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 24px; }
  .about-side {
    border-left: 1px solid var(--line);
    padding-left: 40px;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.7;
  }
  .about-side h4 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink);
    margin-bottom: 12px;
    margin-top: 32px;
    font-weight: 500;
  }
  .about-side h4:first-child { margin-top: 0; }

  /* WORK */
  section.work {
    padding: 80px 32px 120px;
  }
  .work-list {
    display: flex;
    flex-direction: column;
  }
  .work-item {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    gap: 32px;
    padding: 40px 0;
    border-bottom: 1px solid var(--line);
    align-items: center;
    cursor: pointer;
    position: relative;
    transition: padding 0.4s ease;
  }
  .work-item:hover { padding-left: 16px; }
  .work-item:hover .work-arrow { transform: translateX(8px); color: var(--accent); }
  .work-item:first-child { border-top: 1px solid var(--line); }
  .work-num { font-size: 14px; color: var(--ink-soft); }
  .work-meta { display: flex; flex-direction: column; gap: 8px; }
  .work-title {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .work-tags { display: flex; gap: 12px; flex-wrap: wrap; }
  .work-tag {
    font-size: 12px;
    padding: 4px 12px;
    border: 1px solid var(--line);
    border-radius: 100px;
    color: var(--ink-soft);
  }
  .work-arrow {
    font-size: 24px;
    color: var(--ink-soft);
    transition: transform 0.3s ease, color 0.3s ease;
  }

  /* CASE PANEL (modal) */
  .panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(17, 17, 16, 0.5);
    z-index: 200;
    display: flex;
    justify-content: flex-end;
  }
  .panel {
    width: min(880px, 100%);
    height: 100%;
    background: var(--bg);
    overflow-y: auto;
    padding: 80px 64px 120px;
  }
  .panel-close {
    position: sticky;
    top: 0;
    margin-left: auto;
    margin-bottom: 32px;
    background: var(--bg);
    border: 1px solid var(--line);
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    transition: background 0.2s ease;
  }
  .panel-close:hover { background: var(--ink); color: var(--bg); }
  .panel h3 {
    font-family: 'Instrument Serif', serif;
    font-size: 56px;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 24px;
  }
  .panel-meta {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    padding: 24px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 40px;
    font-size: 13px;
  }
  .panel-meta div { display: flex; flex-direction: column; gap: 4px; }
  .panel-meta .lbl { color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; font-size: 11px; }
  .panel h4 {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    font-weight: 400;
    margin: 48px 0 16px;
    letter-spacing: -0.01em;
  }
  .panel p {
    font-size: 17px;
    line-height: 1.65;
    color: var(--ink);
    margin-bottom: 16px;
  }
  .panel ul { margin: 0 0 16px 20px; }
  .panel li { font-size: 17px; line-height: 1.65; margin-bottom: 8px; }

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin: 32px 0;
  }
  .metric {

    background: var(--bg-soft);
    border-radius: 4px;
  }
  .metric .num {
    font-family: 'Instrument Serif', serif;
    font-size: 44px;
    line-height: 1;
    color: var(--accent);
    font-weight: 400;
  }
  .metric .lbl {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 8px;
    line-height: 1.4;
  }

  section.pocs {
    padding: 120px 32px;
    position: relative;
  }
  .pocs-intro {

    margin-bottom: 56px;
    font-size: 18px;
    line-height: 1.6;
    color: var(--ink-soft);

  .pocs-grid {

    grid-template-columns: repeat(3, 1fr);
    gap: 24px;

  .poc-card {

    border-radius: 4px;
    padding: 32px 28px;
    background: var(--bg);

    overflow: hidden;

    border-color: var(--accent);
  }
  .poc-num {
    font-size: 12px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
    margin-bottom: 16px;

  .poc-card h6 {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    font-weight: 400;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
  }
  .poc-stack {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }
  .poc-stack span {
    font-size: 11px;
    padding: 3px 10px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 100px;
    color: var(--ink-soft);
  }
  .poc-card:hover .poc-stack span {
    background: var(--bg);
  }
  .poc-summary {
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink);
    margin-bottom: 16px;
    flex-grow: 1;
  }
  .poc-impact {
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink-soft);
    font-style: italic;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    margin-bottom: 20px;
  }
  .poc-cta {
    align-self: flex-start;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
    padding: 8px 16px;
    border: 1px solid var(--ink);
    border-radius: 100px;
    transition: background 0.2s ease, color 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;

  .poc-cta:hover {
    background: var(--ink);
    color: var(--bg);

    padding: 28px 32px;
    border-left: 3px solid var(--accent);

    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);

    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line);

  .tech-card {

    margin-right: 8px;
    padding: 3px 8px;
    background: var(--bg);
    border-radius: 3px;

  /* WRITING */
  section.writing {
    padding: 120px 32px;
  }
  .essay-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
  }
  .essay {
    padding: 40px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--bg);

  .essay:hover { background: var(--bg-soft); transform: translateY(-4px); }
  .essay .date {
    font-size: 12px;
    color: var(--ink-soft);

    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    font-weight: 400;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 16px;

  .essay p {
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-soft);
  }
  .essay .read {
    margin-top: 24px;
    font-size: 13px;
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  /* CONTACT */
  section.contact {
    padding: 160px 32px;
    text-align: center;
    background: var(--ink);
    color: var(--bg);
  }
  section.contact h2 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(48px, 9vw, 140px);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 48px;
  }
  section.contact h2 .italic { color: var(--accent); font-style: italic; }
  .contact-cta {
    display: inline-block;
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    color: var(--bg);
    text-decoration: none;
    border-bottom: 1px solid var(--bg);
    padding-bottom: 4px;
    margin-bottom: 48px;
    transition: color 0.3s ease, border-color 0.3s ease;
  }
  .contact-cta:hover { color: var(--accent); border-color: var(--accent); }
  .contact-links {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 32px;
    font-size: 14px;
  }
  .contact-links a {
    color: rgba(246, 244, 239, 0.6);
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .contact-links a:hover { color: var(--bg); }

  footer {
    padding: 32px;
    background: var(--ink);
    color: rgba(246, 244, 239, 0.4);
    border-top: 1px solid rgba(246, 244, 239, 0.1);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .container, section { padding-left: 20px; padding-right: 20px; }
    nav.top .inner { padding: 14px 20px; }
    nav.top .links { display: none; }
    .about-grid { grid-template-columns: 1fr; gap: 32px; }
    .about-side { border-left: none; border-top: 1px solid var(--line); padding-left: 0; padding-top: 32px; }
    .work-item { grid-template-columns: 32px 1fr; gap: 16px; padding: 28px 0; }
    .work-arrow { display: none; }
    .tech-grid { grid-template-columns: 1fr; }
    .pocs-grid { grid-template-columns: 1fr; gap: 20px; }
    .essay-grid { grid-template-columns: 1fr; gap: 20px; }
    .essay { padding: 28px; }
    .panel { padding: 40px 24px 80px; }
    .panel h3 { font-size: 36px; }
    .metric-grid { grid-template-columns: 1fr; }
    .hero-meta { gap: 24px; }
    section.about, section.work, section.tech, section.writing, section.pocs { padding: 80px 20px; }
  }
</style>
</head>

  return e('nav', { className: 'top' + (scrolled ? ' scrolled' : '') },

      e('div', { className: 'links' },

}
