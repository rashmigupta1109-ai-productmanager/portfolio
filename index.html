<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>Rashmi Gupta — Senior Product Manager | SaaS, eCommerce, IoT</title>
<meta name="description" content="Senior Product Manager with 10+ years delivering enterprise transformation. $47M+ cost optimization, $14M+ revenue growth across SaaS, eCommerce, and IoT products." />

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23FF6B6B'/%3E%3Cstop offset='100%25' style='stop-color:%23A855F7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='45' fill='url(%23g)'/%3E%3Cpath d='M35 40 L35 70 L50 55 L65 70 L65 40 M42 48 L42 58 M50 45 L50 60 M58 48 L58 58' stroke='white' stroke-width='3' fill='none' stroke-linecap='round'/%3E%3Ccircle cx='72' cy='28' r='8' fill='%2300D9FF'/%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:  #fafafa;
    --bg2: #f0f0f5;
    --bg3: #e5e5ef;
    --ink: #0a0a0f;
    --ink-soft: rgba(10,10,15,0.65);
    --ink-muted: rgba(10,10,15,0.35);
    --line: rgba(10,10,15,0.08);
    --accent: #B8531C;        /* warm copper — used sparingly for distinction */
    --accent2: #92400E;       /* deeper copper for hover */
    --glow: rgba(184,83,28,0.10);
    --purple: #1E40AF;        /* deep slate blue — executive, considered */
    --blue: #1E40AF;
    --cyan: #0D7A6F;          /* deep teal — trust, primary */
    --teal: #0D7A6F;
    --orange: #B8531C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  
  body.custom-cursor {
    cursor: none;
  }

  /* CUSTOM CURSOR */
  #cursor {
    position: fixed;
    width: 14px; height: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: multiply;
    transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease;
  }
  #cursor-ring {
    position: fixed;
    width: 40px; height: 40px;
    border: 2px solid transparent;
    background: linear-gradient(white, white) padding-box,
                linear-gradient(135deg, var(--accent), var(--purple), var(--cyan)) border-box;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
    opacity: 0.5;
  }
  body.hovering #cursor { width: 24px; height: 24px; }
  body.hovering #cursor-ring { width: 70px; height: 70px; opacity: 0.8; }

  ::selection { background: var(--accent); color: #fff; }

  .serif { font-family: 'Playfair Display', Georgia, serif; }
  .mono  { font-family: 'DM Mono', monospace; }

  .container { max-width: 1320px; margin: 0 auto; padding: 0 40px; }

  /* ANIMATED GRADIENT MESH */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 20% 30%, rgba(13,122,111,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 60%, rgba(30,64,175,0.08) 0%, transparent 50%),
      radial-gradient(circle at 50% 80%, rgba(184,83,28,0.06) 0%, transparent 50%);
    opacity: 1;
    pointer-events: none;
    z-index: 0;
    animation: mesh-float 20s ease-in-out infinite;
  }
  @keyframes mesh-float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.05); }
    66% { transform: translate(-30px, 30px) scale(0.95); }
  }

  /* GRAIN OVERLAY */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 1;
  }

  /* NAV */
  nav.top {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 500;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    border-bottom: 1px solid transparent;
  }
  nav.top.scrolled {
    background: rgba(250,250,250,0.9);
    backdrop-filter: blur(24px) saturate(180%);
    border-bottom-color: var(--line);
    box-shadow: 0 4px 24px rgba(0,0,0,0.03);
  }
  nav.top .brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  nav.top .links { display: flex; gap: 36px; }
  nav.top .links a {
    color: var(--ink-soft);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: all 0.2s ease;
    position: relative;
  }
  nav.top .links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    transition: width 0.3s ease;
  }
  nav.top .links a:hover { color: var(--ink); }
  nav.top .links a:hover::after { width: 100%; }
  nav.top .nav-cta {
    font-size: 13px;
    font-weight: 600;
    padding: 10px 24px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    border-radius: 100px;
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 4px 16px rgba(13,122,111,0.28);
  }
  nav.top .nav-cta:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(13,122,111,0.36);
  }

  /* HERO */
  section.hero {
    min-height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  .hero-canvas {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  /* Animated gradient orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.15;
    animation: orb-float 15s ease-in-out infinite;
  }
  .orb-1 {
    width: 800px; height: 800px;
    background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
    top: -200px; right: -100px;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, var(--purple) 0%, transparent 70%);
    bottom: -150px; left: -100px;
    animation-delay: -5s;
  }
  .orb-3 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
    top: 40%; left: 30%;
    animation-delay: -10s;
  }
  .orb-4 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, var(--teal) 0%, transparent 70%);
    top: 20%; right: 30%;
    animation-delay: -7s;
  }
  @keyframes orb-float {
    0%, 100% { transform: translate(0,0) scale(1); }
    25% { transform: translate(40px, -50px) scale(1.08); }
    50% { transform: translate(-30px, 30px) scale(0.92); }
    75% { transform: translate(30px, 40px) scale(1.05); }
  }

  /* Grid lines background */
  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 20%, transparent 100%);
    opacity: 0.7;
  }

  /* Floating particles */
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.3;
    animation: particle-float 8s ease-in-out infinite;
  }
  .particle:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
  .particle:nth-child(2) { top: 60%; left: 80%; animation-delay: -2s; background: var(--purple); }
  .particle:nth-child(3) { top: 40%; left: 60%; animation-delay: -4s; background: var(--cyan); }
  .particle:nth-child(4) { top: 75%; left: 30%; animation-delay: -6s; background: var(--teal); }
  @keyframes particle-float {
    0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
    50% { transform: translateY(-40px) translateX(20px); opacity: 0.6; }
  }

  .hero-inner {
    position: relative;
    z-index: 2;
    padding: 180px 40px 120px;
    max-width: 1320px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 80px;
  }

  /* PROFILE IMAGE */
  .profile-container {
    flex-shrink: 0;
    position: relative;
  }
  .profile-image-wrapper {
    width: 280px;
    height: 280px;
    position: relative;
  }
  .profile-glow {
    position: absolute;
    inset: -20px;
    background: linear-gradient(135deg, var(--accent), var(--purple), var(--cyan));
    border-radius: 50%;
    filter: blur(30px);
    opacity: 0.4;
    animation: glow-pulse 3s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.05); }
  }
  .profile-image {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border: 4px solid white;
    box-shadow: 
      0 20px 60px rgba(0,0,0,0.1),
      inset 0 0 0 1px rgba(255,255,255,0.5);
    position: relative;
    z-index: 1;
    overflow: hidden;
  }
  .profile-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  /* Badge floating around profile */
  .profile-badge {
    position: absolute;
    background: white;
    border-radius: 100px;
    padding: 10px 18px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    gap: 8px;
    animation: badge-float 4s ease-in-out infinite;
    z-index: 10;
  }
  .profile-badge.ai {
    top: -5%;
    right: 15%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .profile-badge.pm {
    bottom: -5%;
    left: 15%;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    color: white;
    animation-delay: -2s;
  }
  @keyframes badge-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .badge-dot {
    width: 6px;
    height: 6px;
    background: currentColor;
    border-radius: 50%;
    opacity: 0.8;
  }

  .hero-content {
    flex: 1;
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
    padding: 8px 20px 8px 10px;
    border: 1px solid var(--line);
    border-radius: 100px;
    background: linear-gradient(135deg, rgba(13,122,111,0.08), rgba(30,64,175,0.08));
    backdrop-filter: blur(10px);
  }
  .hero-eyebrow .pulse-dot {
    width: 10px; height: 10px;
    background: var(--teal);
    border-radius: 50%;
    box-shadow: 0 0 0 0 rgba(20,184,166,0.5);
    animation: ripple 2s ease-in-out infinite;
  }
  @keyframes ripple {
    0% { box-shadow: 0 0 0 0 rgba(20,184,166,0.5); }
    70% { box-shadow: 0 0 0 12px rgba(20,184,166,0); }
    100% { box-shadow: 0 0 0 0 rgba(20,184,166,0); }
  }
  .hero-eyebrow span { 
    font-size: 13px; 
    font-weight: 600;
    color: var(--ink-soft); 
    letter-spacing: 0.08em; 
    text-transform: uppercase; 
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(56px, 9vw, 140px);
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }
  .hero h1 .line1 { 
    color: var(--ink); 
    display: block; 
  }
  .hero h1 .line2 {
    display: block;
    background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 50%, var(--cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-style: italic;
    background-size: 200% 200%;
    animation: gradient-shift 8s ease infinite;
  }
  @keyframes gradient-shift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .hero h1 .line3 {
    display: block;
    color: var(--ink-soft);
    font-size: 0.48em;
    font-style: italic;
    font-weight: 400;
    margin-top: 12px;
    letter-spacing: -0.01em;
  }

  .hero p.lede {
    font-size: 20px;
    line-height: 1.7;
    color: var(--ink-soft);
    max-width: 640px;
    margin-bottom: 48px;
  }

  .hero-ctas {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .hero-ctas a {
    padding: 16px 36px;
    border-radius: 100px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .hero-ctas .primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    box-shadow: 0 8px 24px rgba(13,122,111,0.30);
  }
  .hero-ctas .primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(13,122,111,0.38);
  }
  .hero-ctas .secondary {
    border: 2px solid var(--ink);
    color: var(--ink);
    background: transparent;
  }
  .hero-ctas .secondary:hover {
    background: var(--ink);
    color: white;
    transform: translateY(-2px);
  }

  /* MARQUEE */
  .marquee {
    padding: 24px 0;
    background: linear-gradient(90deg, var(--accent) 0%, var(--purple) 50%, var(--cyan) 100%);
    overflow: hidden;
    position: relative;
  }
  .marquee-track {
    display: flex;
    animation: marquee 40s linear infinite;
    white-space: nowrap;
  }
  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .marquee-item {
    display: inline-flex;
    align-items: center;
    padding: 0 40px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .marquee-item::before {
    content: '◆';
    margin-right: 40px;
    font-size: 10px;
    opacity: 0.6;
  }

  /* SECTION LABEL */
  .section-label {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 56px;
  }
  .section-label .num {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    background: linear-gradient(135deg, rgba(13,122,111,0.08), rgba(30,64,175,0.08));
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid rgba(13,122,111,0.22);
  }
  .section-label h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .section-label h2 em {
    background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-style: italic;
  }

  /* ABOUT */
  section.about {
    padding: 140px 0;
    position: relative;
    overflow: hidden;
  }
  .about-bg-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Playfair Display', serif;
    font-size: 240px;
    font-weight: 700;
    font-style: italic;
    color: var(--line);
    z-index: 0;
    pointer-events: none;
    user-select: none;
  }
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    position: relative;
    z-index: 1;
  }
  .about-text p {
    font-size: 18px;
    line-height: 1.8;
    color: var(--ink-soft);
    margin-bottom: 24px;
  }
  .about-text strong {
    color: var(--ink);
    font-weight: 600;
  }
  .about-metrics {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px;
  }
  .metric-box {
    background: white;
    border-radius: 20px;
    padding: 32px;
    border: 1px solid var(--line);
    box-shadow: 0 8px 32px rgba(0,0,0,0.04);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }
  .metric-box::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--purple), var(--cyan));
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .metric-box:hover {
    transform: translateY(-8px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.08);
  }
  .metric-box:hover::before {
    opacity: 1;
  }
  .metric-num {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 12px;
  }
  .metric-lbl {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }

  /* WORK */
  section.work {
    padding: 140px 0;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    position: relative;
  }
  .work-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .work-item {
    background: white;
    padding: 48px 56px;
    display: flex;
    align-items: center;
    gap: 40px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    border-left: 4px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .work-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 0;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .work-item:hover {
    background: linear-gradient(135deg, rgba(13,122,111,0.04), rgba(30,64,175,0.04));
    transform: translateX(12px);
  }
  .work-item:hover::before {
    width: 4px;
  }
  .work-num {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink-muted);
    min-width: 60px;
  }
  .work-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .work-tags {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .work-tag {
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border-radius: 6px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }
  .work-arrow-wrap {
    margin-left: auto;
    font-size: 32px;
    color: var(--accent);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .work-item:hover .work-arrow-wrap {
    transform: translateX(8px);
  }

  /* PANEL */
  .panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.6);
    backdrop-filter: blur(8px);
    z-index: 9000;
    display: flex;
    justify-content: flex-end;
  }
  .panel {

  .panel h4 {

  /* POCS */

    font-size: 11px;

    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .essay:hover {
    transform: translateY(-8px);

  .essay:hover::before {
    transform: scaleX(1);

  .essay .date {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);

  .essay h5 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;

    margin-bottom: 14px;
    letter-spacing: -0.01em;
  }
  .essay p {
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink-soft);
    margin-bottom: 20px;
  }
  .essay .read {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);

  }
  .essay:hover .read {
    color: var(--purple);
  }

  /* CONTACT */
  section.contact {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 120px 40px;
    text-align: center;
  }
  .contact-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
    z-index: 0;
  }
  .contact-rings {
    position: absolute;
    inset: 0;
    z-index: 1;
  }
  .ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid var(--line);
    animation: ring-pulse 8s ease-in-out infinite;
  }
  .ring-1 { width: 300px; height: 300px; animation-delay: 0s; }
  .ring-2 { width: 500px; height: 500px; animation-delay: -2s; }
  .ring-3 { width: 700px; height: 700px; animation-delay: -4s; }
  .ring-4 { width: 900px; height: 900px; animation-delay: -6s; }
  @keyframes ring-pulse {
    0%, 100% { opacity: 0.1; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.05); }
  }
  .contact h2 {
    position: relative;
    z-index: 2;
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 8vw, 120px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 48px;
  }
  .contact .accent-line {
    display: block;
    background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 50%, var(--cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-style: italic;
  }
  .contact-email {
    position: relative;
    z-index: 2;
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--ink);
    text-decoration: none;
    margin-bottom: 40px;
    display: inline-block;
    transition: all 0.3s ease;
  }
  .contact-email:hover {
    color: var(--accent);
    transform: translateY(-4px);
  }
  .contact-links {
    position: relative;
    z-index: 2;
    display: flex;
    gap: 32px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .contact-links a {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-soft);
    text-decoration: none;
    transition: all 0.2s ease;
    position: relative;
  }
  .contact-links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    transition: width 0.3s ease;
  }
  .contact-links a:hover {
    color: var(--ink);
  }
  .contact-links a:hover::after {
    width: 100%;
  }

  footer {
    padding: 48px 40px;
    text-align: center;

    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--line);
    background: var(--bg);
  }

  /* COUNTER ANIMATION */
  .counter { display: inline-block; }

  /* RESPONSIVE */
  @media (max-width: 1200px) {
    .hero-inner { flex-direction: column; gap: 48px; text-align: center; }
    .profile-container { order: -1; }
    .hero-content { align-items: center; }
    .hero p.lede { max-width: 100%; }
    .hero-ctas { justify-content: center; }
  }
  @media (max-width: 900px) {
    .about-grid { grid-template-columns: 1fr; gap: 56px; }

    .essay-grid { grid-template-columns: 1fr; }

  }

    /* Marquee */
    .marquee-item { font-size: 13px; padding: 0 24px; }
    
    /* Section labels */
    .section-label { flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 40px; }
    .section-label h2 { font-size: 32px; }
    .section-label .num { font-size: 12px; }
    
    /* About */
    section.about { padding: 80px 0; }
    .about-text p { font-size: 16px; line-height: 1.7; }
    .about-metrics { grid-template-columns: 1fr; gap: 16px; }
    .metric-box { padding: 24px; border-radius: 16px; }
    .metric-num { font-size: 44px; }

    }

    .work-title { font-size: 24px; }
    .work-tag { font-size: 11px; padding: 5px 12px; }
    .work-arrow-wrap { margin-left: 0; font-size: 24px; align-self: flex-end; }
    
    /* Panel */
    .panel { padding: 60px 24px; }
    .panel-close { top: 20px; right: 20px; width: 40px; height: 40px; font-size: 24px; }
    .panel h3 { font-size: 32px; margin-bottom: 24px; }
    .panel-meta { grid-template-columns: 1fr; gap: 16px; padding-bottom: 24px; margin-bottom: 32px; }
    .panel-summary { font-size: 16px; margin-bottom: 32px; }

    /* POCs */

    /* Footer */
    footer { 
      padding: 32px 20px; 
      flex-direction: column; 
      gap: 12px; 
      font-size: 12px; 
      text-align: center;

  /* Extra small screens */
  @media (max-width: 375px) {

    .poc-card:hover,
    .tech-card:hover,

  /* STRATEGY (Automation Framework) */

    left: 50%;

    background: linear-gradient(90deg, var(--accent), var(--purple), var(--cyan));
  }
  .strategy-card-eyebrow {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 20px;
  }
  .strategy-card-eyebrow .sf-num {

    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    if (!cursor || !ring) return;
    
    document.body.classList.add('custom-cursor');
    
    let cursorX = 0, cursorY = 0;
    let ringX = 0, ringY = 0;

    const handleMouseMove = (e) => {
      cursorX = e.clientX;
      cursorY = e.clientY;
    };

    document.addEventListener('mousemove', handleMouseMove);

    function animate() {
      ringX += (cursorX - ringX) * 0.15;
      ringY += (cursorY - ringY) * 0.15;
      cursor.style.transform = `translate(${cursorX - 7}px, ${cursorY - 7}px)`;
      ring.style.transform = `translate(${ringX - 20}px, ${ringY - 20}px)`;
      requestAnimationFrame(animate);
    }
    const animationId = requestAnimationFrame(animate);

    const hoverTargets = 'a, button, .work-item, .poc-card, .essay';
    const handleMouseOver = (e) => {
      if (e.target.closest(hoverTargets)) document.body.classList.add('hovering');
    };
    const handleMouseOut = (e) => {
      if (e.target.closest(hoverTargets)) document.body.classList.remove('hovering');
    };
    
    document.addEventListener('mouseover', handleMouseOver);
    document.addEventListener('mouseout', handleMouseOut);
    
    return () => {
      document.removeEventListener('mousemove', handleMouseMove);
      document.removeEventListener('mouseover', handleMouseOver);
      document.removeEventListener('mouseout', handleMouseOut);
      cancelAnimationFrame(animationId);
    };
  }, []);
  
  return null;
}

// ===================== COUNTER =====================
function Counter({ target, prefix = '', suffix = '' }) {
  const [count, setCount] = useState(0);
  const [hasAnimated, setHasAnimated] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting && !hasAnimated) {
            setHasAnimated(true);
            animateValue();
          }
        });
      },
      { threshold: 0.3 }
    );

    if (ref.current) {
      observer.observe(ref.current);
    }

    return () => {
      if (ref.current) {
        observer.unobserve(ref.current);
      }
    };
  }, [hasAnimated]);

  const animateValue = () => {
    const duration = 2000;
    const steps = 60;
    const increment = target / steps;
    let current = 0;
    
    const timer = setInterval(() => {
      current += increment;
      if (current >= target) {
        setCount(target);
        clearInterval(timer);
      } else {
        setCount(Math.floor(current));
      }
    }, duration / steps);
  };

  const displayValue = () => {
    if (suffix === '%') {
      return count + suffix;
    }
    if (prefix === '$' && count >= 1) {
      return prefix + count + 'M';
    }
    if (count >= 10) {
      return count + '+';
    }
    return count;
  };

  return e('span', { ref: ref, className: 'counter' }, displayValue());
}

function VennSvg({ hover, setHover, setTip, stageRef }) {
  const W = 600, H = 560, r = 165;
  const C = { ai: { cx: 300, cy: 200 }, rpa: { cx: 195, cy: 360 }, api: { cx: 405, cy: 360 } };
  const inC = (px, py, c) => (px - c.cx) ** 2 + (py - c.cy) ** 2 <= r * r;
  const detect = (px, py) => {
    const a = inC(px, py, C.ai), b = inC(px, py, C.rpa), c = inC(px, py, C.api);
    const n = a + b + c;
    if (n === 0) return null;
    if (n === 3) return 'all';
    if (n === 2) return a && b ? 'ai-rpa' : a && c ? 'ai-api' : 'rpa-api';
    return a ? 'ai' : b ? 'rpa' : 'api';
  };
  const onMove = (ev) => {
    const svg = ev.currentTarget;
    const pt = svg.createSVGPoint(); pt.x = ev.clientX; pt.y = ev.clientY;
    const ctm = svg.getScreenCTM(); if (!ctm) return;
    const loc = pt.matrixTransform(ctm.inverse());
    const reg = detect(loc.x, loc.y);
    setHover(reg);
    const sr = stageRef.current.getBoundingClientRect();
    setTip({ x: ev.clientX - sr.left, y: ev.clientY - sr.top, visible: !!reg });
  };
  const onLeave = () => { setHover(null); setTip(t => ({ ...t, visible: false })); };
  const onTouch = (ev) => {
    const t = ev.touches && ev.touches[0]; if (!t) return;
    const svg = ev.currentTarget;
    const pt = svg.createSVGPoint(); pt.x = t.clientX; pt.y = t.clientY;
    const ctm = svg.getScreenCTM(); if (!ctm) return;
    const loc = pt.matrixTransform(ctm.inverse());
    const reg = detect(loc.x, loc.y);
    setHover(reg);
    const sr = stageRef.current.getBoundingClientRect();
    setTip({ x: t.clientX - sr.left, y: t.clientY - sr.top, visible: !!reg });
    if (reg) ev.preventDefault();
  };
  const isActive = (k) => {
    if (!hover) return false;
    if (hover === k) return true;
    if (hover === 'all') return ['rpa','ai','api'].includes(k);
    if (hover === 'ai-rpa') return k === 'ai' || k === 'rpa';
    if (hover === 'ai-api') return k === 'ai' || k === 'api';
    if (hover === 'rpa-api') return k === 'rpa' || k === 'api';
    return false;
  };
  const renderBullets = (key, x, y, anchor) => AUTOMATION_CATS[key].bullets.map((b, i) =>
    e('text', { key: b, x, y: y + i * 14, className: 'sf-bullet', textAnchor: anchor }, '\u2022 ' + b)
  );
  return e('svg', { viewBox: `0 0 ${W} ${H}`, onMouseMove: onMove, onMouseLeave: onLeave, onTouchStart: onTouch, onTouchMove: onTouch, onTouchEnd: onLeave },
    e('circle', { className: 'sf-circle sf-c-ai' + (isActive('ai') ? ' is-active' : ''), cx: C.ai.cx, cy: C.ai.cy, r }),
    e('circle', { className: 'sf-circle sf-c-rpa' + (isActive('rpa') ? ' is-active' : ''), cx: C.rpa.cx, cy: C.rpa.cy, r }),
    e('circle', { className: 'sf-circle sf-c-api' + (isActive('api') ? ' is-active' : ''), cx: C.api.cx, cy: C.api.cy, r }),
    e('g', { className: 'sf-label-g' + (isActive('ai') ? ' is-active' : '') },
      e('text', { x: 300, y: 110, className: 'sf-title sf-t-ai', textAnchor: 'middle' }, 'AI'),
      ...renderBullets('ai', 300, 132, 'middle')),
    e('g', { className: 'sf-label-g' + (isActive('rpa') ? ' is-active' : '') },
      e('text', { x: 175, y: 410, className: 'sf-title sf-t-rpa', textAnchor: 'middle' }, 'RPA'),
      ...renderBullets('rpa', 175, 432, 'middle')),
    e('g', { className: 'sf-label-g' + (isActive('api') ? ' is-active' : '') },
      e('text', { x: 425, y: 410, className: 'sf-title sf-t-api', textAnchor: 'middle' }, 'API'),
      ...renderBullets('api', 425, 432, 'middle')),
    e('g', { className: 'sf-label-g' + ((hover === 'ai-rpa' || hover === 'all') ? ' is-active' : '') },
      e('text', { x: 210, y: 258, className: 'sf-overlap', textAnchor: 'middle' }, 'AI + RPA'),

}

function Strategy() {
  const [values, setValues] = useState({ data_type: 0.7, decision: 0.6, access: 0.3, change: 0.5, scale: 0.55 });
  const [hover, setHover] = useState(null);
  const [tip, setTip] = useState({ x: 0, y: 0, visible: false });
  const stageRef = useRef(null);

  const { scores, winner, reason, ranked } = useMemo(() => {
    const acc = { rpa: 0, ai: 0, api: 0 };
    AUTOMATION_DIMS.forEach(d => { const s = d.score(values[d.key]); acc.rpa += s.rpa; acc.ai += s.ai; acc.api += s.api; });
    const max = Math.max(acc.rpa, acc.ai, acc.api, 0.001);
    const norm = { rpa: acc.rpa / max, ai: acc.ai / max, api: acc.api / max };
    const ranked = Object.entries(norm).sort((a, b) => b[1] - a[1]);
    const winner = ranked[0][0], second = ranked[1][0];
    const margin = ranked[0][1] - ranked[1][1];
    const cues = [];
    if (winner === 'ai') {
      if (values.data_type > 0.55) cues.push('unstructured inputs');
      if (values.decision > 0.55) cues.push('judgment-heavy decisions');
      if (values.change > 0.55) cues.push('a frequently changing process');
    } else if (winner === 'rpa') {
      if (values.access > 0.5) cues.push('UI-only system access');
      if (values.decision < 0.45) cues.push('rule-based decisions');
      if (values.scale < 0.55) cues.push('moderate throughput');
    } else {
      if (values.data_type < 0.4) cues.push('structured data');
      if (values.access < 0.4) cues.push('available APIs');
      if (values.scale > 0.55) cues.push('high-volume needs');
    }
    let reason;
    if (cues.length === 0) reason = `Scores are close, but ${AUTOMATION_CATS[winner].name} edges ahead. Consider combining with ${AUTOMATION_CATS[second].name}.`;
    else {
      const list = cues.length === 1 ? cues[0] : cues.slice(0, -1).join(', ') + ' and ' + cues[cues.length - 1];
      reason = `${AUTOMATION_CATS[winner].name} fits because of ${list}.`;
      if (margin < 0.15) reason += ` Close call \u2014 combining with ${AUTOMATION_CATS[second].name} may help.`;
    }
    return { scores: norm, winner, reason, ranked };
  }, [values]);

  const tipContent = (() => {
    if (!hover) return null;
    if (['rpa','ai','api'].includes(hover)) {
      const cat = AUTOMATION_CATS[hover];
      return { label: cat.full, title: cat.name, body: cat.tagline + ' \u2014 ' + cat.bullets.slice(0, 3).join(', ').toLowerCase() + '.' };
    }
    const o = AUTOMATION_OVERLAPS[hover];
    return { label: o.label, title: o.title, body: o.body };
  })();

  return e('section', { id: 'strategy', className: 'strategy' },
    e('div', { className: 'strategy-bg-text' }, 'AI \u00b7 RPA \u00b7 API'),
    e('div', { className: 'container' },
      e(SectionLabel, { num: '04', title: e(React.Fragment, null, 'Strategy ', e('em', null, 'in motion')) }),
      e(motion.p, {
        className: 'strategy-intro',
        initial: { opacity: 0, y: 24 },
        whileInView: { opacity: 1, y: 0 },
        viewport: { once: true, margin: '-60px' },
        transition: { duration: 0.7 }
      }, 'Most automation programs fail because teams reach for the tool they know, not the one the problem needs. After deploying UiPath RPA, integrating APIs at scale, and shipping AI assistants in production, I built this evaluation model to make the trade-offs explicit. Hover the diagram \u2014 score your workload \u2014 see the recommendation.'),
      e(motion.div, {
        className: 'strategy-grid',
        initial: { opacity: 0, y: 30 },
        whileInView: { opacity: 1, y: 0 },
        viewport: { once: true, margin: '-40px' },
        transition: { duration: 0.8 }
      },
        e('div', { className: 'strategy-venn-card' },
          e('div', { className: 'strategy-card-eyebrow' },
            e('span', { className: 'sf-num' }, '01'),
            e('span', null, 'The three approaches'),
            e('span', { className: 'sf-line' }),
            e('span', { className: 'sf-hint' }, 'Hover any region')
          ),
          e('div', { className: 'sf-stage' + ((hover || winner) ? ' has-hover' : ''), ref: stageRef },
            e(VennSvg, { hover: hover || winner, setHover, setTip: setTip, stageRef }),
            tipContent ? e('div', {
              className: 'sf-tooltip' + (tip.visible ? ' visible' : ''),
              style: { left: tip.x + 'px', top: tip.y + 'px' }
            },
              e('div', { className: 'sf-tt-label' }, tipContent.label),
              e('div', { className: 'sf-tt-title' }, tipContent.title),
              e('div', null, tipContent.body)
            ) : null
          ),
          e('div', { className: 'sf-legend' },
            e('div', { className: 'sf-leg-item' }, e('span', { className: 'sf-leg-dot sf-d-rpa' }), 'RPA \u2014 rule-based'),
            e('div', { className: 'sf-leg-item' }, e('span', { className: 'sf-leg-dot sf-d-ai' }), 'AI \u2014 judgment'),
            e('div', { className: 'sf-leg-item' }, e('span', { className: 'sf-leg-dot sf-d-api' }), 'API \u2014 direct integration')
          )
        ),
        e('div', { className: 'strategy-eval-card' },
          e('div', { className: 'strategy-card-eyebrow' },
            e('span', { className: 'sf-num' }, '02'),
            e('span', null, 'How to evaluate'),
            e('span', { className: 'sf-line' })
          ),
          e('h3', { className: 'sf-eval-title' }, 'Score the workload.'),
          e('p', { className: 'sf-eval-sub' }, 'Move each slider to match your situation. The recommendation updates live.'),
          AUTOMATION_DIMS.map((d, i) => {
            const v = values[d.key];
            const fill = v >= 0.5
              ? { left: '50%', width: ((v - 0.5) * 100) + '%' }
              : { left: (v * 100) + '%', width: ((0.5 - v) * 100) + '%' };
            return e('div', { className: 'sf-slider-row', key: d.key },
              e('div', { className: 'sf-slider-head' },
                e('div', { className: 'sf-slider-name' }, d.name),
                e('span', { className: 'sf-slider-num' }, String(i + 1).padStart(2, '0') + ' / 05')
              ),
              e('div', { className: 'sf-range-row' },
                e('input', {
                  type: 'range', min: 0, max: 1, step: 0.01, value: v,
                  onChange: (ev) => setValues(prev => ({ ...prev, [d.key]: parseFloat(ev.target.value) }))
                }),
                e('div', { className: 'sf-range-track' },
                  e('div', { className: 'sf-range-ticks' },
                    [0,1,2,3,4].map(j => e('span', { key: j, className: 'sf-range-tick' + (j === 2 ? ' middle' : '') }))
                  ),
                  e('div', { className: 'sf-range-fill', style: fill })
                ),
                e('div', { className: 'sf-range-thumb', style: { left: (v * 100) + '%' } })
              ),
              e('div', { className: 'sf-range-labels' },
                e('span', { className: v < 0.4 ? 'lab-active' : '' }, d.leftLabel),
                e('span', { className: v > 0.6 ? 'lab-active' : '' }, d.rightLabel)
              )
            );
          }),
          e('div', { className: 'sf-result is-' + winner },
            e('div', { className: 'sf-result-head' },
              e('span', { className: 'sf-result-label' }, 'Recommendation'),
              e('span', { className: 'sf-result-label sf-result-fit' }, Math.round(scores[winner] * 100) + '% fit')
            ),
            e('div', { className: 'sf-result-name' }, 'Choose ', e('em', null, AUTOMATION_CATS[winner].name), ' \u2192'),
            e('p', { className: 'sf-result-reason' }, reason),
            e('div', { className: 'sf-score-bars' },
              ranked.map(([k, val]) => e('div', { className: 'sf-score-row', key: k },
                e('span', { className: 'sf-score-name' }, AUTOMATION_CATS[k].name),
                e('div', { className: 'sf-score-bar' },
                  e('div', { className: 'sf-score-fill sf-d-' + k, style: { width: (val * 100) + '%' } })
                ),
                e('span', { className: 'sf-score-val' }, Math.round(val * 100))
              ))
            )
          )
        )
      ),
      e(motion.div, {
        className: 'poc-callout',
        initial: { opacity: 0, x: -24 },
        whileInView: { opacity: 1, x: 0 },
        viewport: { once: true, margin: '-40px' },
        transition: { duration: 0.7 }
      },
        e('em', null, 'Why this matters: '),
        'Frameworks beat opinions. When stakeholders ask "why not just AI?" or "why not just RPA?" \u2014 I can show them, in 30 seconds, where their workload sits and why the right answer is usually a combination.'
      )
    )
  );
}

// ===================== TECH =====================

  return e('section', { id: 'tech', className: 'tech' },
    e('div', { className: 'container' },
      e(SectionLabel, { num: '05', title: e(React.Fragment, null, 'Technical ', e('em', null, 'fluency')) }),
